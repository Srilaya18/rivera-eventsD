apiVersion: apps/v1
kind: Deployment
metadata:
  name: rivera-events
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rivera-events
  template:
    metadata:
      labels:
        app: rivera-events
    spec:
      containers:
      - name: rivera-events
        image: srilayam/rivera-events:latest   
        ports:
        - containerPort: 8089

---
apiVersion: v1
kind: Service
metadata:
  name: rivera-service
spec:
  type: NodePort
  selector:
    app: rivera-events
  ports:
    - port: 8089
      targetPort: 8089
      nodePort: 30009